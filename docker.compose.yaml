services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEBUI_RAYON_NUM_THREADS: ${WEBUI_RAYON_NUM_THREADS:-2}
        WEBUI_NODE_OPTIONS: ${WEBUI_NODE_OPTIONS:---max-old-space-size=1024}
    image: ${GATEWAY_DOCKER_IMAGE:-liveagent-gateway:local}
    environment:
      LIVEAGENT_GATEWAY_TOKEN: ${LIVEAGENT_GATEWAY_TOKEN:-dev-token}
      LIVEAGENT_GATEWAY_HTTP_ADDR: :8080
    ports:
      - "${LIVEAGENT_GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped
